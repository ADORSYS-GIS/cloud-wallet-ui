name: AI PR Review (Local Ollama)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, review_requested]
  issue_comment:
    types: [created]

jobs:
  pr-agent:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Run PR-Agent with Local Ollama
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # === Model Configuration (100% local & free) ===
          config.model: "ollama/qwen2.5-coder:7b"
          config.fallback_models: '["ollama/qwen2.5-coder:7b"]'
          config.custom_model_max_tokens: "128000"

          # Ollama connection - important for your machine
          OLLAMA.API_BASE: "http://localhost:11434"

          # Automatic actions
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"

          # Tuning for work laptop (more stable)
          config.ai_timeout: "360"          
          config.verbosity_level: "1"
          config.max_model_tokens: "32000"

          # Reduce load on your CPU
          OLLAMA_NUM_PARALLEL: "2"
          